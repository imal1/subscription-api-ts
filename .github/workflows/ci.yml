name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (oxlint)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.0.30

      - name: Install dependencies
        run: bun install

      - name: Run oxlint
        run: bun run lint

  typecheck:
    name: Type Check (tsc)
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.0.30

      - name: Install dependencies
        run: bun install

      - name: Run TypeScript compiler
        run: cd frontend && bunx tsc --noEmit

  build:
    name: Build (Next.js standalone)
    needs: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.0.30

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Verify standalone output
        run: |
          set -euo pipefail
          STANDALONE=frontend/.next/standalone
          if [ ! -f "$STANDALONE/frontend/server.js" ]; then
            echo "❌ missing $STANDALONE/frontend/server.js"
            exit 1
          fi
          echo "✅ standalone build verified"
