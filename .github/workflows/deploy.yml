name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: '要部署的 git ref（默认当前分支）'
        required: false

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_BASE_DIR: ${{ secrets.DEPLOY_BASE_DIR || '/root/.config/subscription' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.0.30

      - name: Setup Node (for next build runtime parity)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: bun install

      - name: Build (Next standalone)
        run: bun run build

      - name: Assemble standalone bundle
        run: |
          set -euo pipefail
          STANDALONE=frontend/.next/standalone
          test -f "$STANDALONE/frontend/server.js" || { echo "missing $STANDALONE/frontend/server.js"; exit 1; }
          # standalone 不会自带 .next/static 与 public，必须复制进去
          cp -r frontend/.next/static "$STANDALONE/frontend/.next/static"
          if [ -d frontend/public ]; then
            cp -r frontend/public "$STANDALONE/frontend/public"
          fi

      - name: Compute release id
        id: rel
        run: |
          ID="$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
          echo "id=$ID" >> "$GITHUB_OUTPUT"
          echo "release id: $ID"

      - name: Pack tarball
        run: |
          set -euo pipefail
          tar -C frontend/.next/standalone -czf release.tar.gz .
          ls -lh release.tar.gz

      - name: Setup SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          if [ -n "${{ secrets.DEPLOY_KNOWN_HOSTS }}" ]; then
            printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
            chmod 600 ~/.ssh/known_hosts
          else
            # 兜底：首次部署时 fingerprint 未配置，用 keyscan（弱化校验）
            ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" > ~/.ssh/known_hosts 2>/dev/null
          fi

      - name: Upload artifact & deploy script
        run: |
          set -euo pipefail
          REMOTE="$DEPLOY_USER@$DEPLOY_HOST"
          REL_ID="${{ steps.rel.outputs.id }}"
          REMOTE_TMP="/tmp/subscription-deploy-$REL_ID"

          ssh -p "$DEPLOY_PORT" -i ~/.ssh/id_deploy "$REMOTE" "mkdir -p '$REMOTE_TMP'"

          scp -P "$DEPLOY_PORT" -i ~/.ssh/id_deploy \
            release.tar.gz \
            scripts/server-deploy.sh \
            "$REMOTE:$REMOTE_TMP/"

          ssh -p "$DEPLOY_PORT" -i ~/.ssh/id_deploy "$REMOTE" "chmod +x '$REMOTE_TMP/server-deploy.sh'"

      - name: Apply deploy on remote
        run: |
          set -euo pipefail
          REMOTE="$DEPLOY_USER@$DEPLOY_HOST"
          REL_ID="${{ steps.rel.outputs.id }}"
          REMOTE_TMP="/tmp/subscription-deploy-$REL_ID"

          ssh -p "$DEPLOY_PORT" -i ~/.ssh/id_deploy "$REMOTE" \
            "BASE_DIR='$DEPLOY_BASE_DIR' '$REMOTE_TMP/server-deploy.sh' apply '$REMOTE_TMP/release.tar.gz' '$REL_ID'"

      - name: Cleanup remote tmp
        if: always()
        run: |
          REMOTE="$DEPLOY_USER@$DEPLOY_HOST"
          REL_ID="${{ steps.rel.outputs.id }}"
          ssh -p "$DEPLOY_PORT" -i ~/.ssh/id_deploy "$REMOTE" \
            "rm -rf '/tmp/subscription-deploy-$REL_ID'" || true

      - name: Summary
        if: success()
        run: |
          echo "### ✅ Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- release: \`${{ steps.rel.outputs.id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- host: \`$DEPLOY_HOST\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- commit: \`${GITHUB_SHA::7}\`" >> "$GITHUB_STEP_SUMMARY"
